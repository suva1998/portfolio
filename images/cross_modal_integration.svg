<?xml version="1.0" encoding="utf-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="860" viewBox="0 0 1200 860" xmlns:bx="https://boxy-svg.com"><defs><bx:export><bx:file format="svg" path="cross_modal_integration.svg"/></bx:export></defs><style>
    .panel { fill:#fff; stroke:#000; stroke-width:1.5; rx:8; }
    .label { fill:#fff; stroke:#000; stroke-width:1; }
    .labelText { font: 12px 'Times New Roman', Times, serif; font-weight:700; }
    .title { font: 11px 'Times New Roman', Times, serif; font-weight:700; text-transform:uppercase; }
    .txt { font: 10px 'Times New Roman', Times, serif; }
    .small { font: 9px 'Times New Roman', Times, serif; }
    .tiny  { font: 8.5px 'Times New Roman', Times, serif; }
    .box { fill:#fff; stroke:#000; stroke-width:1; }
    .flow { fill:#fff; stroke:#000; stroke-width:1; }
    .hsi  { fill:#f5f5f5; }
    .xrf  { fill:#e8e8e8; }
    .formula { fill:#fafafa; stroke:#000; stroke-width:1; }
    .stats { fill:#f8f8f8; stroke:#000; stroke-width:1; }
    .th { fill:#f0f0f0; font-weight:700; }
    .hi { fill:#e0e0e0; font-weight:700; }
    .bold { font-weight:700; }
    .center { text-anchor:middle; }
    .right { text-anchor:end; }
    .arrow { font: 14px 'Times New Roman', Times, serif; }
    .cons { fill:#000; stroke:#000; }
    .tran { fill:#808080; stroke:#000; }
    .incon { fill:#fff; stroke:#000; }
    .conf { fill:#fff; stroke:#000; }
  </style><rect class="panel" width="550" height="230" x="40" y="30" style="stroke-width: 1.5;"/><rect class="label" x="50" y="18" width="28" height="18" rx="3" style="stroke-width: 1;"/><text class="labelText center" x="64" y="31" style="white-space: pre; stroke-width: 1; font-size: 12px;">(a)</text><text class="title center" x="315" y="52" style="white-space: pre; stroke-width: 1; font-size: 11px;">Depth-Based Registration Process</text><text class="txt bold" x="60" y="78" style="white-space: pre; stroke-width: 1; font-size: 10px;">HSI Data Stream (Interval-Based):</text><g transform="matrix(1, 0, 0, 1, 79.999992, 89.999999)"><g><rect class="flow hsi" x="0" y="0" width="90" height="48"/><text class="small center" x="45" y="18" style="white-space: pre;">HSI₁</text><text class="small center" x="45" y="34" style="white-space: pre;">0.0–0.2 m</text></g><g transform="translate(120,0)"><rect class="flow hsi" x="0" y="0" width="90" height="48"/><text class="small center" x="45" y="18" style="white-space: pre;">HSI₂</text><text class="small center" x="45" y="34" style="white-space: pre;">0.2–0.4 m</text></g><g transform="translate(240,0)"><rect class="flow hsi" x="0" y="0" width="90" height="48"/><text class="small center" x="45" y="18" style="white-space: pre;">HSI₃</text><text class="small center" x="45" y="34" style="white-space: pre;">0.4–0.6 m</text></g></g><text class="arrow center" x="315" y="168" style="white-space: pre; stroke-width: 1; font-size: 14px;">↓ Depth Matching ↓</text><text class="txt bold" x="60" y="184" style="white-space: pre; stroke-width: 1; font-size: 10px;">XRF Data Stream (Point-Based):</text><g transform="matrix(1, 0, 0, 1, 79.999992, 195.999998)"><g><rect class="flow xrf" x="0" y="0" width="90" height="48"/><text class="small center" x="45" y="18" style="white-space: pre;">XRF₁</text><text class="small center" x="45" y="34" style="white-space: pre;">0.1 m</text></g><g transform="translate(120,0)"><rect class="flow xrf" x="0" y="0" width="90" height="48"/><text class="small center" x="45" y="18" style="white-space: pre;">XRF₂</text><text class="small center" x="45" y="34" style="white-space: pre;">0.3 m</text></g><g transform="translate(240,0)"><rect class="flow xrf" x="0" y="0" width="90" height="48"/><text class="small center" x="45" y="18" style="white-space: pre;">XRF₃</text><text class="small center" x="45" y="34" style="white-space: pre;">0.5 m</text></g></g><g transform="matrix(0.842682, 0, 0, 0.842682, 423.023097, 146.445799)" style=""><rect class="formula" x="0" y="0" width="180" height="52" rx="4"/><text class="small" x="90" y="18" text-anchor="middle" style="white-space: pre;">
        Match(d₍HSI₎, d₍XRF₎) = True
      </text><text class="small center" x="90" y="36" style="white-space: pre;">
        if |d₍HSI,center₎ − d₍XRF₎| ≤ τ₍match₎
      </text></g><text class="tiny center" x="485" y="242" style="white-space: pre; stroke-width: 1; font-size: 8.5px;">where τ₍match₎ = 0.1–0.2 m (tolerance)</text><rect class="panel" width="550" height="230" x="610" y="30" style="stroke-width: 1.5;"/><rect class="label" x="620" y="18" width="28" height="18" rx="3" style="stroke-width: 1;"/><text class="labelText center" x="634" y="31" style="white-space: pre; stroke-width: 1; font-size: 12px;">(b)</text><text class="title center" x="885" y="52" style="white-space: pre; stroke-width: 1; font-size: 11px;">Contingency Matrix Framework</text><g transform="matrix(1, 0, 0, 1, 629.999993, 73.999999)"><rect class="box th" x="0" y="0" width="200" height="28"/><rect class="box th" x="200" y="0" width="80" height="28"/><rect class="box th" x="280" y="0" width="80" height="28"/><rect class="box th" x="360" y="0" width="80" height="28"/><rect class="box th" x="440" y="0" width="80" height="28"/><text class="tiny center" x="100" y="18" style="white-space: pre;">Class \ Domain</text><text class="tiny center" x="240" y="18" style="white-space: pre;">Domain 0</text><text class="tiny center" x="320" y="18" style="white-space: pre;">Domain 1</text><text class="tiny center" x="400" y="18" style="white-space: pre;">Domain k</text><text class="tiny center" x="480" y="18" style="white-space: pre;">Total</text><rect class="box" x="0" y="28" width="200" height="26"/><rect class="box hi" x="200" y="28" width="80" height="26"/><rect class="box" x="280" y="28" width="80" height="26"/><rect class="box" x="360" y="28" width="80" height="26"/><rect class="box" x="440" y="28" width="80" height="26"/><text class="tiny bold" x="10" y="45" style="white-space: pre;">Class 1</text><text class="tiny center" x="240" y="45" style="white-space: pre;">N₁,₀</text><text class="tiny center" x="320" y="45" style="white-space: pre;">N₁,₁</text><text class="tiny center" x="400" y="45" style="white-space: pre;">N₁,ₖ</text><text class="tiny center" x="480" y="45" style="white-space: pre;">N₁,•</text><rect class="box" x="0" y="54" width="200" height="26"/><rect class="box" x="200" y="54" width="80" height="26"/><rect class="box hi" x="280" y="54" width="80" height="26"/><rect class="box" x="360" y="54" width="80" height="26"/><rect class="box" x="440" y="54" width="80" height="26"/><text class="tiny bold" x="10" y="71" style="white-space: pre;">Class 2</text><text class="tiny center" x="240" y="71" style="white-space: pre;">N₂,₀</text><text class="tiny center" x="320" y="71" style="white-space: pre;">N₂,₁</text><text class="tiny center" x="400" y="71" style="white-space: pre;">N₂,ₖ</text><text class="tiny center" x="480" y="71" style="white-space: pre;">N₂,•</text><rect class="box" x="0" y="80" width="200" height="26"/><rect class="box" x="200" y="80" width="80" height="26"/><rect class="box" x="280" y="80" width="80" height="26"/><rect class="box hi" x="360" y="80" width="80" height="26"/><rect class="box" x="440" y="80" width="80" height="26"/><text class="tiny bold" x="10" y="97" style="white-space: pre;">Class m</text><text class="tiny center" x="240" y="97" style="white-space: pre;">Nₘ,₀</text><text class="tiny center" x="320" y="97" style="white-space: pre;">Nₘ,₁</text><text class="tiny center" x="400" y="97" style="white-space: pre;">Nₘ,ₖ</text><text class="tiny center" x="480" y="97" style="white-space: pre;">Nₘ,•</text><rect class="box" x="0" y="106" width="200" height="26"/><rect class="box" x="200" y="106" width="80" height="26"/><rect class="box" x="280" y="106" width="80" height="26"/><rect class="box" x="360" y="106" width="80" height="26"/><rect class="box" x="440" y="106" width="80" height="26"/><text class="tiny bold" x="10" y="123" style="white-space: pre;">Total</text><text class="tiny center" x="240" y="123" style="white-space: pre;">N•,₀</text><text class="tiny center" x="320" y="123" style="white-space: pre;">N•,₁</text><text class="tiny center" x="400" y="123" style="white-space: pre;">N•,ₖ</text><text class="tiny center" x="480" y="123" style="white-space: pre;">N</text></g><g transform="matrix(1.020542, 0, 0, 1.020542, 629.999993, 207.589155)" style=""><rect class="stats" x="0" y="0" width="510" height="40" rx="4"/><text class="tiny bold" x="8" y="14" style="white-space: pre;">Statistical Independence Testing:</text><text class="tiny" x="8" y="28" style="white-space: pre;">• Chi-square: χ² = Σ (Oᵢⱼ − Eᵢⱼ)² / Eᵢⱼ   • Cramér’s V = √(χ² / (N·min(r−1, c−1)))   • α = 0.05</text></g><g transform="translate(40,280)"><rect class="panel" width="550" height="230"/><rect class="label" x="10" y="-12" width="28" height="18" rx="3"/><text class="labelText center" x="24" y="1" style="white-space: pre;">(c)</text><text class="title center" x="275" y="22" style="white-space: pre;">Domain-Specific Class Priors</text><g transform="translate(20,44)"><rect class="formula" x="0" y="0" width="510" height="40" rx="4"/><text class="small center" x="255" y="16" style="white-space: pre;">P(Class = c | Domain = d) = N𝑐,𝑑 / Σ𝑐′ N𝑐′,𝑑</text><text class="tiny center" x="255" y="32" style="white-space: pre;">Constraint: Σ𝑐 P(c | d) = 1 for each domain d</text></g><g transform="translate(20,102)"><text class="small bold" x="0" y="0" style="white-space: pre;">Example Prior Distributions:</text><text class="small bold" x="0" y="22" style="white-space: pre;">Domain 0 (Fe–Cu enriched):</text><text class="tiny" x="14" y="36" style="white-space: pre;">P(Class 1 | D₀) = 0.15</text><text class="tiny" x="14" y="52" style="white-space: pre;">P(Class 2 | D₀) = 0.65</text><text class="tiny" x="14" y="68" style="white-space: pre;">P(Class 3 | D₀) = 0.20</text><text class="small bold" x="280" y="22" style="white-space: pre;">Domain 1 (Background levels):</text><text class="tiny" x="294" y="36" style="white-space: pre;">P(Class 1 | D₁) = 0.70</text><text class="tiny" x="294" y="52" style="white-space: pre;">P(Class 2 | D₁) = 0.20</text><text class="tiny" x="294" y="68" style="white-space: pre;">P(Class 3 | D₁) = 0.10</text></g></g><rect class="panel" width="550" height="230" x="610" y="280" style="stroke-width: 1.5;"/><rect class="label" x="620" y="268" width="28" height="18" rx="3" style="stroke-width: 1;"/><text class="labelText center" x="634" y="281" style="white-space: pre; stroke-width: 1; font-size: 12px;">(d)</text><text class="title center" x="885" y="302" style="white-space: pre; stroke-width: 1; font-size: 11px;">Confidence-Weighted Prediction Framework</text><g transform="matrix(1, 0, 0, 1, 629.999993, 325.999996)"><rect class="box" x="0" y="0" width="510" height="54" rx="4"/><text class="small" x="8" y="16" style="white-space: pre;"><tspan class="bold">Step 1:</tspan> Individual modality predictions</text><text class="tiny" x="24" y="34" style="white-space: pre;">HSI → P₍HSI₎(class)</text><text class="tiny" x="220" y="34" style="white-space: pre;">XRF → P₍XRF₎(domain)</text></g><g transform="matrix(1, 0, 0, 1, 629.999993, 385.999996)"><rect class="box" x="0" y="0" width="510" height="54" rx="4"/><text class="small" x="8" y="16" style="white-space: pre;"><tspan class="bold">Step 2:</tspan> Confidence weight calculation</text><text class="tiny" x="24" y="34" style="white-space: pre;">w₍HSI₎ = max(P₍HSI₎) · R₍HSI₎    •    w₍XRF₎ = silhouette(d) · R₍XRF₎</text></g><g transform="matrix(1, 0, 0, 1, 629.999993, 445.999995)"><rect class="box" x="0" y="0" width="510" height="54" rx="4"/><text class="small" x="8" y="16" style="white-space: pre;"><tspan class="bold">Step 3:</tspan> Weighted integration</text><text class="tiny" x="24" y="36" style="white-space: pre;">P₍integrated₎(l) = ( w₍HSI₎·P₍HSI₎(l) + w₍XRF₎·P₍XRF₎(l) ) / ( w₍HSI₎ + w₍XRF₎ )</text></g><g transform="matrix(1, 0, 0, 1, 950.99999, 321.999997)"><rect class="conf" x="0" y="0" width="50" height="30" rx="3"/><rect class="conf" x="60" y="0" width="70" height="30" rx="3"/><rect class="conf" x="140" y="0" width="50" height="30" rx="3"/><text class="tiny center" x="25" y="18" style="white-space: pre;">High</text><text class="tiny center" x="95" y="18" style="white-space: pre;">Medium</text><text class="tiny center" x="165" y="18" style="white-space: pre;">Low</text></g><g transform="translate(220,530)"><rect class="panel" width="760" height="260"/><rect class="label" x="10" y="-12" width="28" height="18" rx="3"/><text class="labelText center" x="24" y="1" style="white-space: pre;">(e)</text><text class="title center" x="380" y="22" style="white-space: pre;">Spatial Consistency Validation</text><g transform="translate(20,44)"><text class="small bold center" x="160" y="0" style="white-space: pre;">Core Depth Profile</text><g transform="translate(60,14)"><g transform="translate(0,0)"><rect x="0" y="0" width="4" height="20" fill="#000"/><text class="tiny" x="12" y="14" style="white-space: pre;">0.0 m: Class 1</text><rect class="cons" x="210" y="6" width="10" height="10"/></g><g transform="translate(0,26)"><rect x="0" y="0" width="4" height="20" fill="#000"/><text class="tiny" x="12" y="14" style="white-space: pre;">0.2 m: Class 1</text><rect class="cons" x="210" y="6" width="10" height="10"/></g><g transform="translate(0,52)"><rect x="0" y="0" width="4" height="20" fill="#000"/><text class="tiny" x="12" y="14" style="white-space: pre;">0.4 m: Class 2</text><rect class="tran" x="210" y="6" width="10" height="10"/></g><g transform="translate(0,78)"><rect x="0" y="0" width="4" height="20" fill="#000"/><text class="tiny" x="12" y="14" style="white-space: pre;">0.6 m: Class 2</text><rect class="cons" x="210" y="6" width="10" height="10"/></g><g transform="translate(0,104)"><rect x="0" y="0" width="4" height="20" fill="#000"/><text class="tiny" x="12" y="14" style="white-space: pre;">0.8 m: Class 1</text><rect class="incon" x="210" y="6" width="10" height="10"/></g><g transform="translate(0,130)"><rect x="0" y="0" width="4" height="20" fill="#000"/><text class="tiny" x="12" y="14" style="white-space: pre;">1.0 m: Class 2</text><rect class="cons" x="210" y="6" width="10" height="10"/></g></g></g><g transform="translate(400,44)"><text class="small bold" x="0" y="0" style="white-space: pre;">Validation Metrics:</text><text class="tiny bold" x="0" y="20" style="white-space: pre;">Spatial Autocorrelation:</text><text class="tiny" x="14" y="36" style="white-space: pre;">• Moran’s I = Σᵢ Σⱼ wᵢⱼ(xᵢ − x̄)(xⱼ − x̄) / (S² Σᵢ Σⱼ wᵢⱼ)</text><text class="tiny" x="14" y="52" style="white-space: pre;">• Local consistency index</text><text class="tiny bold" x="0" y="80" style="white-space: pre;">Transition Detection:</text><text class="tiny" x="14" y="96" style="white-space: pre;">• Gradient threshold: |∇p| &gt; 2σ</text><text class="tiny" x="14" y="112" style="white-space: pre;">• Boundary identification</text><text class="tiny bold" x="0" y="140" style="white-space: pre;">Outlier Assessment:</text><text class="tiny" x="14" y="156" style="white-space: pre;">• Isolation scoring</text><text class="tiny" x="14" y="172" style="white-space: pre;">• Confidence weighting</text></g><g transform="translate(20,220)"><text class="tiny bold" x="0" y="0" style="white-space: pre;">Legend:</text><g transform="translate(70,-8)"><rect class="cons" x="0" y="0" width="10" height="10"/><text class="tiny" x="16" y="9" style="white-space: pre;">Consistent</text></g><g transform="translate(170,-8)"><rect class="tran" x="0" y="0" width="10" height="10"/><text class="tiny" x="16" y="9" style="white-space: pre;">Transition Zone</text></g><g transform="translate(300,-8)"><rect class="incon" x="0" y="0" width="10" height="10"/><text class="tiny" x="16" y="9" style="white-space: pre;">Inconsistent</text></g></g></g></svg>