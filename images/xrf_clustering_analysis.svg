    </style><marker id="arrow" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto" markerUnits="strokeWidth"><path d="M0,0 L9,3 L0,6 z" fill="#000"/></marker><bx:export><bx:file format="svg" path="xrf_clustering_analysis.svg"/></bx:export></defs><g transform="matrix(1.335201, 0, 0, 1.335201, -39.774982, 8.532385)" style=""><rect class="box" width="347.043" height="208.226" style="" x="-47.043" y="-14.113"/><text class="lab" style="font-size: 17.4px; white-space: pre;" x="-34.105" y="-25.77">(a)</text><text class="panelTitle" style="font-size: 22.5px; font-style: italic; font-weight: 400; white-space: pre;" x="126.784" y="22.384">Data Ingestion &amp; QC</text><g transform="matrix(1, 0, 0, 1, -8.437894, 39.948185)"><rect class="pill" x="-26.271" y="-2.608" width="321.764" height="31.216" style=""/><text class="sm" style="font-size: 15.7px; white-space: pre;" x="-3.482" y="17">Load XRF spectra / peak table (CSV/JSON)</text><text class="tiny" style="font-size: 15.728px; white-space: pre;" x="0" y="54" transform="matrix(1, 0, 0, 1, -14.97901, 0)">• Drop non-element columns · <tspan x="0" dy="1em">​</tspan>  handle missing (impute/zero if below LOD)</text><text class="tiny" style="font-size: 15.7px; white-space: pre;" x="0" y="90.478" transform="matrix(1, 0, 0, 1, -13.48111, 0)">• Optional calibration/normalization <tspan x="0" dy="1em">​</tspan>   per instrument/run</text><text class="tiny" style="font-size: 15.7px; white-space: pre;" x="-50.183" y="129.952" transform="matrix(1, 0, 0, 1, 35.949634, 0)">• Keep element peaks (e.g., Fe(Kα), Cu(Kα), <tspan x="-50.18299865722656" dy="1em">​</tspan>S(Kα), Mn(Kα), Zn(Kα), …)</text></g></g><g transform="matrix(1.561625, 0, 0, 1.561625, 401.576961, -10.431447)" style=""><rect class="box" width="300" height="180"/><text class="lab" style="font-size: 14.1px; white-space: pre;" x="-2.551" y="-7.335">(b)</text><text class="panelTitle" style="font-size: 22.4px; font-style: italic; font-weight: 400; white-space: pre;" x="150" y="29.92">Preprocessing</text><g transform="translate(16,54)"><rect class="pill" x="0" y="0" width="268" height="26"/><text class="sm" style="font-size: 15.4px; white-space: pre;" x="4.88" y="17">log1p transform + Z-score standardization</text><text class="tiny" style="font-size: 16.009px; white-space: pre;" x="0" y="54">• Clip/winsorize outliers (e.g., 99th pct)</text><text class="tiny" style="font-size: 15.3686px; white-space: pre;" x="0" y="74">• Feature keep-rule: elements with <tspan x="0" dy="1em">​</tspan>  sufficient prevalence</text><text class="tiny" style="font-size: 16.6493px; white-space: pre;" x="0" y="109.36">• Matrix X ∈ ℝ^{n×p}</text></g></g><g transform="matrix(1.564718, 0, 0, 1.564718, 914.395071, -14.805055)" style=""><rect class="box" width="300" height="180"/><text class="lab" x="10" y="-10" style="white-space: pre;">(c)</text><text class="panelTitle" style="font-size: 20.5px; font-style: italic; font-weight: 400; white-space: pre;" x="150" y="31.195">Dimensionality Reduction (PCA)</text><g transform="translate(16,54)"><rect class="pill" x="0" y="0" width="268" height="26"/><text class="sm" style="font-size: 17.3px; white-space: pre;" x="33.643" y="17">Fit PCA on X (standardized)</text><text class="tiny" style="font-size: 14.6991px; white-space: pre;" x="0" y="54">• Retain M comps for clustering (e.g., M=10)</text><text class="tiny" style="font-size: 16px; white-space: pre;" x="0" y="77.834">• Use PC1–PC2 for visualization</text><g transform="translate(0,94)"><rect class="soft" x="0" y="0" width="120" height="60"/><polyline points="6,50 26,32 46,24 66,18 86,15 106,13" fill="none" stroke="#000" stroke-width="1.2"/><text class="tiny" style="font-size: 13.4209px; text-anchor: middle; white-space: pre;" x="60" y="56">Scree</text></g><g transform="translate(140,94)"><rect class="soft" x="0" y="0" width="120" height="60"/><circle cx="30" cy="34" r="6" fill="#fff" stroke="#000"/><circle cx="56" cy="26" r="6" fill="#fff" stroke="#000"/><circle cx="88" cy="18" r="6" fill="#fff" stroke="#000"/><text class="tiny" style="font-size: 15.3382px; text-anchor: middle; white-space: pre;" x="60" y="56">PC axes</text></g></g></g><g transform="matrix(1.70645, 0, 0, 1.70645, 1426.066635, -22.799421)" style=""><rect class="box" width="300" height="180"/><text class="lab" x="10" y="-10" style="white-space: pre;">(d)</text><text class="panelTitle" style="font-size: 20.5px; font-style: italic; font-weight: 400; white-space: pre;" x="150" y="33.274">Model Selection: k</text><g transform="translate(16,54)"><rect class="pill" x="0" y="0" width="268" height="26"/><text class="sm" style="font-size: 15.2px; white-space: pre;" x="42.23" y="17">Grid k = 2 … 20 on PCA(M)</text><text class="tiny" style="font-size: 15.8223px; white-space: pre;" x="0" y="54">• Compute inertia (Elbow) &amp; silhouette</text><text class="tiny" style="font-size: 15.8223px; white-space: pre;" x="0" y="74">• Choose k* (e.g., 5)</text><g transform="translate(0,94)"><rect class="soft" x="0" y="0" width="120" height="60"/><polyline points="6,14 26,22 46,30 66,38 86,45 106,49" fill="none" stroke="#000" stroke-width="1.2"/><text class="tiny" style="font-size: 13.4783px; text-anchor: middle; white-space: pre;" x="60" y="56">Elbow</text></g><g transform="translate(140,94)"><rect class="soft" x="0" y="0" width="120" height="60"/><polyline points="6,48 26,26 46,30 66,32 86,35 106,38" fill="none" stroke="#000" stroke-width="1.2"/><text class="tiny" style="font-size: 14.0643px; text-anchor: middle; white-space: pre;" x="60" y="56">Silhouette</text></g></g></g><line x1="364" y1="130" x2="404" y2="130" stroke="#000" stroke-width="1.6" marker-end="url(#arrow)"/><line x1="872.086" y1="128.463" x2="912.086" y2="128.463" stroke="#000" stroke-width="1.6" marker-end="url(#arrow)"/><line x1="1385.66" y1="130.768" x2="1425.66" y2="130.768" stroke="#000" stroke-width="1.6" marker-end="url(#arrow)"/><g transform="matrix(1.595483, 0, 0, 1.595483, -95.241897, 408.025844)" style=""><rect class="box" width="420" height="200"/><text class="lab" x="10" y="-10" style="white-space: pre;">(e)</text><text class="panelTitle" style="font-size: 23.2px; font-style: italic; font-weight: 400; white-space: pre;" x="210" y="31.135">Clustering (KMeans, k*)</text><g transform="translate(16,54)"><rect class="pill" x="0" y="0" width="388" height="26"/><text class="sm" style="font-size: 16.9px; white-space: pre;" x="65.176" y="17">Fit on PCA(M): labels ∈ {0,…,k*−1}</text><text class="tiny" style="font-size: 16.9228px; white-space: pre;" x="0" y="54">• Save model &amp; scaler for reproducibility</text><g transform="translate(0,72)"><rect class="shade" x="0" y="0" width="388" height="58"/><text class="tiny" style="font-size: 16.296px; white-space: pre;" x="8" y="18">labels = KMeans(n_clusters=k*).fit_predict(PCA_M)</text><text class="tiny" style="font-size: 16.296px; white-space: pre;" x="8" y="36">df['Cluster'] = labels</text><text class="tag" style="font-size: 16.296px; white-space: pre;" x="8" y="54">Outputs: cluster.csv (sample_id, cluster)</text></g></g></g><g transform="matrix(1.660385, 0, 0, 1.660385, 642.564812, 406.074153)" style=""><rect class="box" width="330" height="200"/><text class="lab" x="10" y="-10" style="white-space: pre;">(f)</text><text class="panelTitle" style="font-size: 22.3px; font-style: italic; font-weight: 400; white-space: pre;" x="165" y="31.612">Cluster Visualization</text><g transform="translate(16,54)"><rect class="pill" x="0" y="0" width="298" height="26"/><text class="sm" style="font-size: 16.9px; white-space: pre;" x="25.652" y="17">PC1–PC2 scatter, colored by cluster</text><g transform="translate(0,44)"><rect class="soft" x="0" y="0" width="298" height="120"/><circle cx="40" cy="90" r="5" fill="#fff" stroke="#000"/><circle cx="70" cy="80" r="5" fill="#fff" stroke="#000"/><circle cx="120" cy="78" r="5" fill="#fff" stroke="#000"/><circle cx="160" cy="40" r="5" fill="#fff" stroke="#000"/><circle cx="210" cy="50" r="5" fill="#fff" s