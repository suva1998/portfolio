g transform="translate(16,54)"><rect class="pill" x="0" y="0" width="428" height="26"/><text class="sm" style="font-size: 19.4px; white-space: pre;" x="185.799" y="18.944">Artifacts</text><text class="tiny" style="font-size: 15.5px; white-space: pre;" x="0" y="51.362">• cluster.csv (sample_id, cluster) · pca_components.npy · kmeans.joblib</text><text class="tiny" style="font-size: 14.7px; white-space: pre;" x="0" y="71.103">• cluster_means.csv · top_elements.png · priors_PClass_given_Domain.csv</text><text class="tiny" style="font-size: 17.3812px; white-space: pre;" x="0" y="92">• notebook checksum · config.json (random seeds, k*, params)</text><g transform="translate(0,110)"><rect class="shade" x="0" y="0" width="200" height="60"/><text class="tiny" style="font-size: 17.3812px; white-space: pre;" x="8" y="20">cluster.csv</text><text class="tiny" style="font-size: 17.3812px; white-space: pre;" x="8" y="38">n rows = samples</text></g><g transform="matrix(0.965499, 0, 0, 0.965499, 217.999998, 111.035018)" style=""><rect class="shade" x="0" y="0" width="210" height="60"/><text class="tiny" style="font-size: 14.4px; white-space: pre;" x="7.937" y="18.967">priors_PClass_given_Domain.csv</text><text class="tiny" style="font-size: 17.3812px; white-space: pre;" x="8" y="38">5 classes × D domains</text></g></g></g><line x1="993.381" y1="1008.61" x2="756.94" y2="1008.61" stroke="#000" stroke-width="1.6" marker-end="url(#arrow)" style=""/><line x1="644.229" y1="725.904" x2="472.913" y2="844.051" stroke="#000" stroke-width="1.2" marker-end="url(#arrow)" style="transform-box: fill-box; transform-origin: 79.9737% 24.5783%;"/><line x1="1251.29" y1="727.674" x2="1093.39" y2="840.471" stroke="#000" stroke-width="1.2" marker-end="url(#arrow)" style=""/></svg>